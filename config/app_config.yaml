# Application and API configuration.
# Override via environment: BACKEND_CORS_ORIGINS, QASIC_PIPELINE_BASE, QASIC_REPO_ROOT (optional).

app:
  title: "QASIC Engineering-as-Code API"
  version: "0.1.0"

paths:
  pipeline_base: "pipeline_result"
  engineering_dir: "src/core_compute/engineering"
  docs_dir: "docs"
  # Credentials vault: set to a path (e.g. storage/credentials.json) or override with QASIC_CREDENTIALS_FILE
  credentials_file: ""

cors:
  # Production: set BACKEND_CORS_ORIGINS to comma-separated whitelist (e.g. https://app.example.com). Never use allow_credentials with "*".
  allow_origins: ""
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]
