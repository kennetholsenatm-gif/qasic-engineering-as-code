apiVersion: v1
kind: Service
metadata:
  name: {{ include "qasic.fullname" . }}-api
  labels:
    app.kubernetes.io/name: qasic-api
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: qasic-api
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.api.shortServiceName }}
# Short name so frontend (nginx proxy_pass http://api:8000) can reach API in-cluster. Use one release per namespace.
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app.kubernetes.io/name: qasic-api
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: qasic-api
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
