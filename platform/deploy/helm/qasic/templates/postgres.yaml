{{- if .Values.postgres.enabled }}
{{- if not (and .Values.postgres.useExternalSecret .Values.postgres.externalSecret.targetSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qasic.fullname" . }}-postgres
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  password: {{ .Values.postgres.password | default "qasic" | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qasic.fullname" . }}-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.postgres.port }}
              name: postgres
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if and .Values.postgres.useExternalSecret .Values.postgres.externalSecret.targetSecretName }}{{ .Values.postgres.externalSecret.targetSecretName }}{{ else }}{{ include "qasic.fullname" . }}-postgres{{ end }}
                  key: password
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
          resources:
            limits: { cpu: "500m", memory: "512Mi" }
            requests: { cpu: "100m", memory: "256Mi" }
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qasic.fullname" . }}-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
