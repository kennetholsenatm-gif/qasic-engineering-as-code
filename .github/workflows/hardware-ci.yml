# Hardware CI: on PR/push to relevant paths, run tests + pipeline + thermodynamic validation.
# DevSecOps: SCA, SAST, container scanning; no masked test failures.
name: Hardware CI

on:
  push:
    branches: [main, master]
    paths:
      - 'protocols/**'
      - 'asic/**'
      - 'engineering/**'
      - 'apps/**'
      - 'state/**'
      - 'docs/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'app/**'
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'protocols/**'
      - 'asic/**'
      - 'engineering/**'
      - 'apps/**'
      - 'state/**'
      - 'docs/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'app/**'
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  sca:
    name: SCA (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: SCA Python (requirements)
        run: |
          pip-audit -r requirements.txt
          pip-audit -r app/requirements.txt
          [ ! -f engineering/requirements-engineering.txt ] || pip-audit -r engineering/requirements-engineering.txt
      - name: Setup Node (frontend SCA)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: SCA frontend (npm audit)
        run: |
          cd frontend && npm audit --audit-level=high
        continue-on-error: true

  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit (app + engineering)
        run: bandit -r app/ engineering/ -ll -x '*/tests/*','*_test.py' --format json -o bandit-report.json || true
      - name: Run Bandit (exit on high)
        run: bandit -r app/ engineering/ -ll -x '*/tests/*','*_test.py' -q

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install -r engineering/requirements-engineering.txt
      - name: Run pytest
        run: python -m pytest tests/ -v --ignore=tests/test_engineering_protocol_ibm.py

  hardware-verify:
    name: Pipeline + thermodynamic + HEaC
    runs-on: ubuntu-latest
    needs: [test, sca, sast]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r engineering/requirements-engineering.txt
          pip install -r requirements-test.txt
      - name: Run pipeline (routing + inverse + HEaC, --fast, no Meep)
        run: |
          python engineering/run_pipeline.py -o ci_result --heac --fast
      - name: Thermodynamic validator
        run: |
          if [ -f engineering/ci_result_inverse_phases.npy ]; then
            python engineering/thermodynamic_validator.py engineering/ci_result_inverse_phases.npy -j
          elif [ -f engineering/ci_result_inverse.json ]; then
            python engineering/thermodynamic_validator.py engineering/ci_result_inverse.json -j
          else
            echo "No phases/inverse output; skipping thermodynamic validator"
          fi
      - name: HIL compile pulse and calibration and routing
        run: python -m pulse --circuit teleport -o engineering/ci_schedule.json
      - name: HIL calibration and routing
        run: |
          if [ -f engineering/ci_baseline/ci_synthetic_telemetry.json ]; then
            python -m engineering.calibration.run_calibration_cycle engineering/ci_baseline/ci_synthetic_telemetry.json -o engineering/ci_decoherence_from_calibration.json --n-nodes 3
            if [ -f engineering/ci_decoherence_from_calibration.json ]; then
              python -m engineering.routing_qubo_qaoa -o engineering/ci_hil_routing.json --decoherence-file engineering/ci_decoherence_from_calibration.json
            fi
          fi
      - name: Run HIL assertions
        run: |
          pip install pytest
          python -m pytest tests/test_hil_ci.py -v
      - name: Prepare pipeline artifacts
        run: |
          mkdir -p ci-artifacts
          for f in engineering/ci_result_routing.json engineering/ci_result_inverse.json engineering/ci_result_inverse_phases.npy engineering/ci_result_geometry_manifest.json engineering/ci_schedule.json engineering/ci_decoherence_from_calibration.json engineering/ci_hil_routing.json; do
            [ -f "$f" ] && cp "$f" ci-artifacts/
          done
      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: ci-artifacts
          if-no-files-found: ignore

  container-scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    needs: [sca, sast]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f Dockerfile.api -t qasic-api:ci .
      - name: Run Trivy (API image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'qasic-api:ci'
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t qasic-frontend:ci .
      - name: Run Trivy (frontend image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'qasic-frontend:ci'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

  gds-diff:
    name: GDS diff (optional)
    runs-on: ubuntu-latest
    needs: hardware-verify
    if: success() && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pipeline-outputs
      - name: Copy artifacts to engineering
        run: |
          for f in ci_result_routing.json ci_result_inverse.json ci_result_inverse_phases.npy ci_result_geometry_manifest.json ci_schedule.json ci_decoherence_from_calibration.json ci_hil_routing.json; do
            [ -f "$f" ] && cp "$f" engineering/
          done
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run manifest diff script
        run: |
          pip install -r requirements.txt
          if [ -f engineering/ci_result_geometry_manifest.json ]; then
            python engineering/ci_gds_diff.py engineering/ci_result_geometry_manifest.json --phases engineering/ci_result_inverse_phases.npy -o engineering/ci_diff_report.md || echo "Diff script failed; step continues"
          else
            echo "No manifest artifact; diff skipped"
          fi
        working-directory: ${{ github.workspace }}
        continue-on-error: true
