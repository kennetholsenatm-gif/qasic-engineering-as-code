# Hardware CI: on PR/push to relevant paths, run tests + pipeline + thermodynamic validation.
# DevSecOps: SCA, SAST, container scanning; no masked test failures.
name: Hardware CI

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'apps/**'
      - 'docs/**'
      - 'tests/**'
      - 'requirements*.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'apps/**'
      - 'docs/**'
      - 'tests/**'
      - 'requirements*.txt'
      - '.github/workflows/**'

jobs:
  sca:
    name: SCA (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: SCA Python (requirements)
        run: |
          pip-audit -r requirements.txt
          pip-audit -r src/backend/requirements.txt
          [ ! -f src/core_compute/engineering/requirements-engineering.txt ] || pip-audit -r src/core_compute/engineering/requirements-engineering.txt
      - name: Setup Node (frontend SCA)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: SCA frontend (npm audit)
        run: |
          cd src/frontend && npm audit --audit-level=high
        continue-on-error: true

  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit (backend + core_compute)
        run: bandit -r src/backend/ src/core_compute/ -ll -x '*/tests/*','*_test.py' --format json -o bandit-report.json || true
      - name: Run Bandit (exit on high)
        run: bandit -r src/backend/ src/core_compute/ -ll -x '*/tests/*','*_test.py' -q

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install -r src/core_compute/engineering/requirements-engineering.txt
      - name: Run pytest
        run: python -m pytest tests/ -v --ignore=tests/test_engineering_protocol_ibm.py

  hardware-verify:
    name: Pipeline + thermodynamic + HEaC
    runs-on: ubuntu-latest
    needs: [test, sca, sast]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r src/core_compute/engineering/requirements-engineering.txt
          pip install -r requirements-test.txt
          pip install -e .
      - name: Run pipeline (routing + inverse + HEaC, --fast, no Meep)
        run: |
          python src/core_compute/engineering/run_pipeline.py -o ci_result --heac --fast
      - name: Thermodynamic validator
        run: |
          ENG=src/core_compute/engineering
          if [ -f $ENG/ci_result_inverse_phases.npy ]; then
            python $ENG/thermodynamic_validator.py $ENG/ci_result_inverse_phases.npy -j
          elif [ -f $ENG/ci_result_inverse.json ]; then
            python $ENG/thermodynamic_validator.py $ENG/ci_result_inverse.json -j
          else
            echo "No phases/inverse output; skipping thermodynamic validator"
          fi
      - name: HIL compile pulse and calibration and routing
        run: qasic-pulse --circuit teleport -o src/core_compute/engineering/ci_schedule.json
      - name: HIL calibration and routing
        run: |
          ENG=src/core_compute/engineering
          if [ -f $ENG/ci_baseline/ci_synthetic_telemetry.json ]; then
            python -m src.core_compute.engineering.calibration.run_calibration_cycle $ENG/ci_baseline/ci_synthetic_telemetry.json -o $ENG/ci_decoherence_from_calibration.json --n-nodes 3
            if [ -f $ENG/ci_decoherence_from_calibration.json ]; then
              python -m src.core_compute.engineering.routing_qubo_qaoa -o $ENG/ci_hil_routing.json --decoherence-file $ENG/ci_decoherence_from_calibration.json
            fi
          fi
      - name: Run HIL assertions
        run: |
          pip install pytest
          python -m pytest tests/test_hil_ci.py -v
      - name: Prepare pipeline artifacts
        run: |
          ENG=src/core_compute/engineering
          mkdir -p ci-artifacts
          for f in $ENG/ci_result_routing.json $ENG/ci_result_inverse.json $ENG/ci_result_inverse_phases.npy $ENG/ci_result_geometry_manifest.json $ENG/ci_schedule.json $ENG/ci_decoherence_from_calibration.json $ENG/ci_hil_routing.json; do
            [ -f "$f" ] && cp "$f" ci-artifacts/
          done
      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: ci-artifacts
          if-no-files-found: ignore

  container-scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    needs: [sca, sast]
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: false
          load: true
          tags: qasic-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run Trivy (API image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'qasic-api:ci'
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload SARIF (API)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: api
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          tags: qasic-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run Trivy (frontend image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'qasic-frontend:ci'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload SARIF (frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: frontend

  # Push to ECR on main/master. Set repository variable ENABLE_ECR_PUSH=true and secret AWS_ROLE_TO_ASSUME (OIDC) to enable.
  push-images:
    name: Push images to ECR
    runs-on: ubuntu-latest
    needs: [test, sca, sast, container-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.ENABLE_ECR_PUSH == 'true'
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/qasic-api:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/qasic-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/qasic-frontend:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/qasic-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gds-diff:
    name: GDS diff (optional)
    runs-on: ubuntu-latest
    needs: hardware-verify
    if: success() && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pipeline-outputs
      - name: Copy artifacts to engineering
        run: |
          ENG=src/core_compute/engineering
          for f in ci_result_routing.json ci_result_inverse.json ci_result_inverse_phases.npy ci_result_geometry_manifest.json ci_schedule.json ci_decoherence_from_calibration.json ci_hil_routing.json; do
            [ -f "$f" ] && cp "$f" $ENG/
          done
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run manifest diff script
        run: |
          ENG=src/core_compute/engineering
          pip install -r requirements.txt
          if [ -f $ENG/ci_result_geometry_manifest.json ]; then
            python $ENG/ci_gds_diff.py $ENG/ci_result_geometry_manifest.json --phases $ENG/ci_result_inverse_phases.npy -o $ENG/ci_diff_report.md || echo "Diff script failed; step continues"
          else
            echo "No manifest artifact; diff skipped"
          fi
        working-directory: ${{ github.workspace }}
        continue-on-error: true
